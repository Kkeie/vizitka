name: Terraform

on:
  pull_request:
    branches:
      - master
    paths:
      - infra/terraform/**
      - .github/workflows/terraform.yml
  push:
    branches:
      - master
    paths:
      - infra/terraform/**
      - .github/workflows/terraform.yml
  workflow_dispatch:
    inputs:
      apply:
        description: Apply Terraform changes. Only works on master.
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: infra/terraform
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      YC_CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
      YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
      TF_VAR_cloud_id: ${{ secrets.YC_CLOUD_ID }}
      TF_VAR_folder_id: ${{ secrets.YC_FOLDER_ID }}
      TF_VAR_zone: ${{ vars.YC_ZONE || 'ru-central1-d' }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'vizitka/terraform.tfstate' }}
      TF_STATE_REGION: ${{ vars.TF_STATE_REGION || 'ru-central1' }}
      TF_STATE_ACCESS_KEY_ID: ${{ secrets.TF_STATE_ACCESS_KEY_ID }}
      TF_STATE_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_ACCESS_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.14.0"
          terraform_wrapper: false

      - name: Validate required secrets
        env:
          YC_SA_KEY_JSON: ${{ secrets.YC_SA_KEY_JSON }}
        run: |
          set -Eeuo pipefail
          missing=()

          for name in YC_SA_KEY_JSON YC_CLOUD_ID YC_FOLDER_ID TF_STATE_BUCKET TF_STATE_ACCESS_KEY_ID TF_STATE_SECRET_ACCESS_KEY; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing GitHub secrets:\n' >&2
            printf '  - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Configure Yandex Cloud auth
        env:
          YC_SA_KEY_JSON: ${{ secrets.YC_SA_KEY_JSON }}
        run: |
          set -Eeuo pipefail
          key_file="$RUNNER_TEMP/yc-sa-key.json"
          printf '%s' "$YC_SA_KEY_JSON" > "$key_file"
          chmod 600 "$key_file"
          echo "TF_VAR_service_account_key_file=$key_file" >> "$GITHUB_ENV"

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: |
          set -Eeuo pipefail
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${TF_STATE_REGION}"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: |
          set -Eeuo pipefail
          terraform plan -no-color -out=tfplan
          terraform show -no-color tfplan > tfplan.txt

      - name: Publish plan summary
        if: always() && hashFiles('infra/terraform/tfplan.txt') != ''
        run: |
          {
            echo '## Terraform plan'
            echo
            echo '```text'
            sed -n '1,500p' tfplan.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: |
            infra/terraform/tfplan
            infra/terraform/tfplan.txt
          retention-days: 7

      - name: Terraform apply
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
          (github.event_name == 'workflow_dispatch' && inputs.apply == true && github.ref == 'refs/heads/master')
        run: terraform apply -no-color -auto-approve tfplan
