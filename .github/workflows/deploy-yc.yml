name: Deploy to Yandex Cloud

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-yc-main
  cancel-in-progress: true

env:
  APP_NAME: vizitka
  REGISTRY_HOST: cr.yandex
  VITE_BACKEND_API_URL: /api
  PLATFORM: linux/amd64

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      deploy: ${{ steps.changes.outputs.deploy }}
      backend_image_tag: ${{ steps.meta.outputs.backend_image_tag }}
      frontend_image_tag: ${{ steps.meta.outputs.frontend_image_tag }}
      nginx_image_tag: ${{ steps.meta.outputs.nginx_image_tag }}
      backup_image_tag: ${{ steps.meta.outputs.backup_image_tag }}
      backend_built: ${{ steps.plan.outputs.backend }}
      frontend_built: ${{ steps.plan.outputs.frontend }}
      nginx_built: ${{ steps.plan.outputs.nginx }}
      backup_built: ${{ steps.plan.outputs.backup }}
    env:
      YC_REGISTRY_ID: ${{ secrets.YC_REGISTRY_ID }}
      BACKUP_ENABLED: ${{ secrets.BACKUP_ENABLED || '1' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect deploy changes
        id: changes
        run: |
          set -Eeuo pipefail

          changed_files=""
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            before="${{ github.event.before }}"
            if [[ -n "$before" && "$before" != "0000000000000000000000000000000000000000" ]] \
              && git cat-file -e "${before}^{commit}" 2>/dev/null; then
              base="$before"
            else
              base="$(git hash-object -t tree /dev/null)"
            fi

            changed_files="$(git diff --name-only "$base" "$GITHUB_SHA")"
          fi

          changed_matches() {
            local pattern="$1"
            grep -Eq "$pattern" <<<"$changed_files"
          }

          backend=0
          frontend=0
          nginx=0
          backup=0
          deploy_metadata=0
          registry_check_all=0

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            deploy_metadata=1
            registry_check_all=1
          else
            if changed_matches '^backend/(Dockerfile|package(-lock)?\.json|tsconfig\.json|start\.sh|src/)'; then
              backend=1
            fi

            if changed_matches '^frontend/(Dockerfile|package(-lock)?\.json|tsconfig\.json|vite\.config\.ts|index\.html|nginx\.conf|public/|src/)'; then
              frontend=1
            fi

            if changed_matches '^nginx/(Dockerfile|docker-entrypoint\.sh|templates/)'; then
              nginx=1
            fi

            if changed_matches '^backup/(Dockerfile|backup-sqlite-to-s3\.sh)'; then
              backup=1
            fi

            if changed_matches '^(\.github/workflows/deploy-yc\.yml|scripts/deploy-yc-coi\.sh)$'; then
              deploy_metadata=1
              registry_check_all=1
            fi
          fi

          deploy=0
          if [[ "$backend" == "1" || "$frontend" == "1" || "$nginx" == "1" || "$backup" == "1" || "$deploy_metadata" == "1" ]]; then
            deploy=1
          fi

          {
            echo "backend=$backend"
            echo "frontend=$frontend"
            echo "nginx=$nginx"
            echo "backup=$backup"
            echo "deploy_metadata=$deploy_metadata"
            echo "registry_check_all=$registry_check_all"
            echo "deploy=$deploy"
          } >> "$GITHUB_OUTPUT"

          {
            echo "deploy=${deploy}"
            echo "backend_changed=${backend}"
            echo "frontend_changed=${frontend}"
            echo "nginx_changed=${nginx}"
            echo "backup_changed=${backup}"
            echo "deploy_metadata_changed=${deploy_metadata}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate build secrets
        if: steps.changes.outputs.deploy == '1'
        env:
          YC_SA_KEY_JSON: ${{ secrets.YC_SA_KEY_JSON }}
        run: |
          set -Eeuo pipefail
          missing=()

          for name in YC_SA_KEY_JSON YC_REGISTRY_ID; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing GitHub secrets:\n' >&2
            printf '  - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Install Yandex Cloud CLI
        if: steps.changes.outputs.deploy == '1'
        run: |
          set -Eeuo pipefail
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> "$GITHUB_PATH"

      - name: Configure Yandex Cloud auth
        if: steps.changes.outputs.deploy == '1'
        env:
          YC_SA_KEY_JSON: ${{ secrets.YC_SA_KEY_JSON }}
          YC_CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
          YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
        run: |
          set -Eeuo pipefail
          key_file="$RUNNER_TEMP/yc-sa-key.json"
          printf '%s' "$YC_SA_KEY_JSON" > "$key_file"

          yc config set service-account-key "$key_file"

          if [[ -n "${YC_CLOUD_ID:-}" ]]; then
            yc config set cloud-id "$YC_CLOUD_ID"
          fi

          if [[ -n "${YC_FOLDER_ID:-}" ]]; then
            yc config set folder-id "$YC_FOLDER_ID"
          fi

      - name: Configure Docker credentials
        if: steps.changes.outputs.deploy == '1'
        run: yc container registry configure-docker

      - name: Compute image tags
        if: steps.changes.outputs.deploy == '1'
        id: meta
        run: |
          set -Eeuo pipefail

          hash_paths() {
            git ls-files -z -- "$@" | sort -z | xargs -0 sha256sum | sha256sum | cut -c1-12
          }

          backend_hash="$(hash_paths backend/Dockerfile backend/package.json backend/package-lock.json backend/tsconfig.json backend/start.sh backend/src)"
          frontend_hash="$({
            git ls-files -z -- frontend/Dockerfile frontend/package.json frontend/package-lock.json frontend/tsconfig.json frontend/vite.config.ts frontend/index.html frontend/nginx.conf frontend/public frontend/src | sort -z | xargs -0 sha256sum
            printf '%s\n' "VITE_BACKEND_API_URL=${VITE_BACKEND_API_URL}"
          } | sha256sum | cut -c1-12)"
          nginx_hash="$(hash_paths nginx/Dockerfile nginx/docker-entrypoint.sh nginx/templates)"
          backup_hash="$(hash_paths backup/Dockerfile backup/backup-sqlite-to-s3.sh)"

          {
            echo "backend_image_tag=backend-${backend_hash}"
            echo "frontend_image_tag=frontend-${frontend_hash}"
            echo "nginx_image_tag=nginx-${nginx_hash}"
            echo "backup_image_tag=backup-${backup_hash}"
          } >> "$GITHUB_OUTPUT"

      - name: Plan image builds
        if: steps.changes.outputs.deploy == '1'
        id: plan
        env:
          BACKEND_IMAGE_TAG: ${{ steps.meta.outputs.backend_image_tag }}
          FRONTEND_IMAGE_TAG: ${{ steps.meta.outputs.frontend_image_tag }}
          NGINX_IMAGE_TAG: ${{ steps.meta.outputs.nginx_image_tag }}
          BACKUP_IMAGE_TAG: ${{ steps.meta.outputs.backup_image_tag }}
          CHANGED_BACKEND: ${{ steps.changes.outputs.backend }}
          CHANGED_FRONTEND: ${{ steps.changes.outputs.frontend }}
          CHANGED_NGINX: ${{ steps.changes.outputs.nginx }}
          CHANGED_BACKUP: ${{ steps.changes.outputs.backup }}
          REGISTRY_CHECK_ALL: ${{ steps.changes.outputs.registry_check_all }}
        run: |
          set -Eeuo pipefail

          is_disabled() {
            case "${1:-}" in
              0|false|FALSE|no|NO|off|OFF) return 0 ;;
              *) return 1 ;;
            esac
          }

          image_ref() {
            local component="$1"
            local tag="$2"
            printf '%s/%s/%s-%s:%s' "$REGISTRY_HOST" "$YC_REGISTRY_ID" "$APP_NAME" "$component" "$tag"
          }

          image_missing() {
            local image="$1"
            ! docker manifest inspect "$image" >/dev/null 2>&1
          }

          backend_image="$(image_ref backend "$BACKEND_IMAGE_TAG")"
          frontend_image="$(image_ref frontend "$FRONTEND_IMAGE_TAG")"
          nginx_image="$(image_ref nginx "$NGINX_IMAGE_TAG")"
          backup_image="$(image_ref backup "$BACKUP_IMAGE_TAG")"

          backend=0
          frontend=0
          nginx=0
          backup=0

          if [[ "$REGISTRY_CHECK_ALL" == "1" || "$CHANGED_BACKEND" == "1" ]]; then
            if image_missing "$backend_image"; then
              backend=1
            fi
          fi

          if [[ "$REGISTRY_CHECK_ALL" == "1" || "$CHANGED_FRONTEND" == "1" ]]; then
            if image_missing "$frontend_image"; then
              frontend=1
            fi
          fi

          if [[ "$REGISTRY_CHECK_ALL" == "1" || "$CHANGED_NGINX" == "1" ]]; then
            if image_missing "$nginx_image"; then
              nginx=1
            fi
          fi

          if ! is_disabled "$BACKUP_ENABLED"; then
            if [[ "$REGISTRY_CHECK_ALL" == "1" || "$CHANGED_BACKUP" == "1" ]]; then
              if image_missing "$backup_image"; then
                backup=1
              fi
            fi
          fi

          any=0
          if [[ "$backend" == "1" || "$frontend" == "1" || "$nginx" == "1" || "$backup" == "1" ]]; then
            any=1
          fi

          {
            echo "backend=$backend"
            echo "frontend=$frontend"
            echo "nginx=$nginx"
            echo "backup=$backup"
            echo "any=$any"
          } >> "$GITHUB_OUTPUT"

          {
            echo "backend=${backend_image} build=${backend}"
            echo "frontend=${frontend_image} build=${frontend}"
            echo "nginx=${nginx_image} build=${nginx}"
            echo "backup=${backup_image} build=${backup}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build and push changed images
        if: steps.changes.outputs.deploy == '1' && steps.plan.outputs.any == '1'
        env:
          BACKEND_IMAGE_TAG: ${{ steps.meta.outputs.backend_image_tag }}
          FRONTEND_IMAGE_TAG: ${{ steps.meta.outputs.frontend_image_tag }}
          NGINX_IMAGE_TAG: ${{ steps.meta.outputs.nginx_image_tag }}
          BACKUP_IMAGE_TAG: ${{ steps.meta.outputs.backup_image_tag }}
          BUILD_BACKEND: ${{ steps.plan.outputs.backend }}
          BUILD_FRONTEND: ${{ steps.plan.outputs.frontend }}
          BUILD_NGINX: ${{ steps.plan.outputs.nginx }}
          BUILD_BACKUP: ${{ steps.plan.outputs.backup }}
          SKIP_DOCKER_LOGIN: "1"
          SKIP_DEPLOY: "1"
        run: scripts/deploy-yc-coi.sh

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    if: needs.build.outputs.deploy == '1'
    env:
      YC_REGISTRY_ID: ${{ secrets.YC_REGISTRY_ID }}
      YC_INSTANCE_NAME: ${{ secrets.YC_INSTANCE_NAME }}
      YC_INSTANCE_ID: ${{ secrets.YC_INSTANCE_ID }}
      YC_SERVICE_ACCOUNT_NAME: ${{ secrets.YC_SERVICE_ACCOUNT_NAME }}
      YC_CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
      YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
      DOMAIN: ${{ secrets.DOMAIN }}
      BACKUP_ENABLED: ${{ secrets.BACKUP_ENABLED || '1' }}
      BACKUP_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
      BACKUP_S3_KEY: ${{ secrets.BACKUP_S3_KEY }}
      BACKUP_S3_ACCESS_KEY_ID: ${{ secrets.BACKUP_S3_ACCESS_KEY_ID }}
      BACKUP_S3_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_S3_SECRET_ACCESS_KEY }}
      BACKUP_S3_ENDPOINT_URL: ${{ secrets.BACKUP_S3_ENDPOINT_URL }}
      BACKUP_S3_REGION: ${{ secrets.BACKUP_S3_REGION }}
      BACKEND_IMAGE_TAG: ${{ needs.build.outputs.backend_image_tag }}
      FRONTEND_IMAGE_TAG: ${{ needs.build.outputs.frontend_image_tag }}
      NGINX_IMAGE_TAG: ${{ needs.build.outputs.nginx_image_tag }}
      BACKUP_IMAGE_TAG: ${{ needs.build.outputs.backup_image_tag }}
      SKIP_DOCKER_LOGIN: "1"
      SKIP_BUILD: "1"
      SKIP_PUSH: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        env:
          YC_SA_KEY_JSON: ${{ secrets.YC_SA_KEY_JSON }}
        run: |
          set -Eeuo pipefail
          missing=()

          for name in YC_SA_KEY_JSON YC_REGISTRY_ID JWT_SECRET DOMAIN; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if [[ -z "${YC_INSTANCE_NAME:-}" && -z "${YC_INSTANCE_ID:-}" ]]; then
            missing+=("YC_INSTANCE_NAME or YC_INSTANCE_ID")
          fi

          case "${BACKUP_ENABLED:-1}" in
            0|false|FALSE|no|NO|off|OFF) backup_required=0 ;;
            *) backup_required=1 ;;
          esac

          if [[ "$backup_required" == "1" ]]; then
            for name in BACKUP_S3_BUCKET BACKUP_S3_ACCESS_KEY_ID BACKUP_S3_SECRET_ACCESS_KEY; do
              if [[ -z "${!name:-}" ]]; then
                missing+=("$name")
              fi
            done
          fi

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing GitHub secrets:\n' >&2
            printf '  - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Install Yandex Cloud CLI
        run: |
          set -Eeuo pipefail
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> "$GITHUB_PATH"

      - name: Configure Yandex Cloud auth
        env:
          YC_SA_KEY_JSON: ${{ secrets.YC_SA_KEY_JSON }}
        run: |
          set -Eeuo pipefail
          key_file="$RUNNER_TEMP/yc-sa-key.json"
          printf '%s' "$YC_SA_KEY_JSON" > "$key_file"

          yc config set service-account-key "$key_file"

          if [[ -n "${YC_CLOUD_ID:-}" ]]; then
            yc config set cloud-id "$YC_CLOUD_ID"
          fi

          if [[ -n "${YC_FOLDER_ID:-}" ]]; then
            yc config set folder-id "$YC_FOLDER_ID"
          fi

      - name: Deploy to COI VM
        run: scripts/deploy-yc-coi.sh
