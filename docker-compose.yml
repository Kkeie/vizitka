services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
    environment:
      NODE_ENV: production
      DOCKER: "1"
      PORT: "3000"
      DATABASE_PATH: /app/data/db.sqlite
      UPLOAD_DIR: /app/uploads
      JWT_SECRET: ${JWT_SECRET:-local_dev_jwt_secret_change_me_123456789}
      FRONTEND_URL: ${FRONTEND_URL:-https://${DOMAIN}}
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"http=require('http');http.get('http://localhost:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
        VITE_BACKEND_API_URL: ${VITE_BACKEND_API_URL:-/api}
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PORT: "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    command: >
      /bin/sh -c "envsubst '$$DOMAIN' < /etc/nginx/nginx.conf > /tmp/nginx.conf
      && nginx -c /tmp/nginx.conf -g 'daemon off;'"
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Запускается вручную (см. инструкцию ниже), потом можно поставить cron для обновления
    profiles:
      - certbot

  db-backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    environment:
      DB_PATH: /app/data/db.sqlite
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-604800}
      BACKUP_RETRY_SECONDS: ${BACKUP_RETRY_SECONDS:-300}
      BACKUP_RUN_ON_START: ${BACKUP_RUN_ON_START:-1}
      S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      S3_OBJECT_KEY: ${BACKUP_S3_KEY:-vizitka/db.sqlite}
      S3_ENDPOINT_URL: ${BACKUP_S3_ENDPOINT_URL:-https://storage.yandexcloud.net}
      AWS_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${BACKUP_S3_REGION:-ru-central1}
    volumes:
      - backend_data:/app/data:ro
    restart: unless-stopped
    profiles:
      - backup

volumes:
  backend_data:
  backend_uploads:
  certbot_www:
  certbot_conf:
