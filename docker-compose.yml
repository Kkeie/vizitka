services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
    environment:
      NODE_ENV: production
      DOCKER: "1"
      PORT: "3000"
      DATABASE_PATH: /app/data/db.sqlite
      UPLOAD_DIR: /app/uploads
      JWT_SECRET: ${JWT_SECRET:-local_dev_jwt_secret_change_me_123456789}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"http=require('http');http.get('http://localhost:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
        VITE_BACKEND_API_URL: ${VITE_BACKEND_API_URL:-/api}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    environment:
      PORT: "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  backend_data:
  backend_uploads:
